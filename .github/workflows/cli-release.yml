name: Release CLI

on:
  push:
    branches:
      - main
    paths:
      - 'cli/**'
      - '.github/workflows/cli-release.yml'

defaults:
  run:
    working-directory: ./cli

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: cli/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: cli/pnpm-lock.yaml
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Detect pending changesets
        id: detect
        run: |
          pending=$(find .changeset -name "*.md" ! -name "README.md" 2>/dev/null | wc -l | tr -d ' ')
          echo "pending=$pending" >> "$GITHUB_OUTPUT"
          echo "Found $pending pending changeset(s)."

      - name: Open or update release PR
        if: steps.detect.outputs.pending != '0'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH=changesets-release/main
          git fetch origin
          git checkout -B "$BRANCH" "origin/${GITHUB_REF_NAME}"

          pnpm changeset version

          git add -A
          git commit -m "chore(cli): release"
          git push -f origin "$BRANCH"

          if ! gh pr view "$BRANCH" --repo "$GITHUB_REPOSITORY" --json number > /dev/null 2>&1; then
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --title "chore(cli): release" \
              --body "Automated release PR generated from pending changesets in \`cli/.changeset/\`. Merging this publishes \`@cryptly/cli\` to npm." \
              --base "$GITHUB_REF_NAME" \
              --head "$BRANCH"
          fi

      - name: Publish to npm
        if: steps.detect.outputs.pending == '0'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm changeset publish
