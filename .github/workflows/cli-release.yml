name: Release CLI

on:
  push:
    branches:
      - main
    paths:
      - 'cli/**'
      - '.github/workflows/cli-release.yml'

defaults:
  run:
    working-directory: ./cli

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: cli/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: cli/pnpm-lock.yaml
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # changesets/action@v1's early state check looks at the workspace root
      # for `.changeset/`, ignoring its own `cwd` input. We keep changesets in
      # cli/.changeset/, so symlink it at the root just to satisfy that check.
      # The symlink is gitignored (see /.gitignore) so the action's commit step
      # won't pick it up.
      - name: Symlink .changeset to root for changesets/action
        working-directory: ${{ github.workspace }}
        run: ln -s cli/.changeset .changeset

      - name: Create release PR or publish to npm
        uses: changesets/action@v1
        with:
          cwd: cli
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: 'chore(cli): release'
          title: 'chore(cli): release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
