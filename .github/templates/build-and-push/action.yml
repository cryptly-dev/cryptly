name: Build and push

inputs:
  # Context
  context:
    required: true
  file:
    required: true

  # Dockerhub
  dockerhub-username:
    required: true
  dockerhub-token:
    required: true
  image-name:
    required: true

  # posthog
  posthog-api-key:
    required: true
  posthog-host:
    required: true
  posthog-project-id:
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v1
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1
    - name: Login to DockerHub
      uses: docker/login-action@v1
      with:
        username: ${{ inputs.dockerhub-username }}
        password: ${{ inputs.dockerhub-token }}
    - name: Build and push
      id: docker_build
      uses: docker/build-push-action@v2
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.file }}
        push: true
        tags: ${{ inputs.image-name }}:latest
        build-args: |
          POSTHOG_CLI_API_KEY=${{ inputs.posthog-api-key }}
          POSTHOG_CLI_HOST=${{ inputs.posthog-host }}
          POSTHOG_CLI_PROJECT_ID=${{ inputs.posthog-project-id }}
          GITHUB_ACTIONS=true
          GITHUB_SHA=${{ github.sha }}
          GITHUB_REF_NAME=${{ github.ref_name }}
          GITHUB_REPOSITORY=${{ github.repository }}
          GITHUB_SERVER_URL=${{ github.server_url }}
